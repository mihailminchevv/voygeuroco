<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — Voyageur & Co</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>
<!-- ── NAV ── -->
<nav id="main-nav">
  <div class="nav-brand" onclick="window.location.href='index.html'">
    <div class="nav-brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      </svg>
    </div>
    <span class="nav-brand-text">Voyageur<span>Co</span></span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="map.html" class="active">Map</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li>
      <a href="create.html"
         style="color: var(--gold); border: 1px solid rgba(201,168,76,0.35); padding: 5px 14px; border-radius: 100px;">
        Create my trip
      </a>
    </li>
  </ul>
</nav>
<!-- ── MAP ── -->
<div id="page-map" class="page active" style="padding-top: 64px;">
  <div class="map-layout">
    <aside class="map-sidebar">
      <div class="map-sidebar-header">
        <div class="map-sidebar-title">Berlin Locations</div>
        <div class="map-sidebar-sub" id="map-count">42 places available</div>
        <div class="map-search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="map-search-input" placeholder="Search…" oninput="filterMapPlaces()">
        </div>
      </div>
      <div class="map-places-list" id="map-places-list"></div>

      <div class="map-info-bar">
        <div class="map-info-name" id="map-selected-name">Select a location</div>
        <div class="map-info-coords" id="map-selected-coords">—</div>
      </div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot dot-imperial"></div>Imperial Legacy & Grandeur</div>
        <div class="legend-item"><div class="legend-dot dot-coldwar"></div>Berlin Wall & Cold War Sites</div>
        <div class="legend-item"><div class="legend-dot dot-hidden"></div>Hidden Gems & Secret Parks</div>
        <div class="legend-item"><div class="legend-dot dot-museums"></div>World-Class Museums</div>
        <div class="legend-item"><div class="legend-dot dot-leisure"></div>Leisure & Classic Berlin</div>
        <div class="legend-item"><div class="legend-dot dot-ww2"></div>Third Reich & Totalitarian Ruins</div>
      </div>
    </aside>
    <div id="map-container">
      <div id="leaflet-map"></div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
